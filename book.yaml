title: "{{BOOK_TITLE}}"
author: "{{AUTHOR}}"

cover:
  title_line1: "{{BOOK_TITLE}}"
  title_line2: ""
  subtitle_line1: ""
  subtitle_line2: ""
  font_size_title: 110
  bg_image: "cover/bg_draft.png"

css:
  chapter_image: false

# 印刷仕様（物理本入稿時に設定する。PDF頒布のみなら変更不要）
# 注: 表紙（表1〜表4）・遊び紙は本文ページ数とは別カウント（印刷所が管理）
print:
  binding: "wireless"  # 製本方式: "wireless"=無線綴じ（2の倍数）, "saddle"=中綴じ（4の倍数必須）

  # 印刷費見積もり管理（数字は各印刷所の公式サイトで毎回確認すること）
  # ツールによる自動計算は行わない（APIなし・価格改定の追跡が不可能なため）
  # quote_date を記録することで「見積もりが古い」警告を出すことのみ行う
  # quote_date: "{{QUOTE_DATE}}"  # 見積もりを取った日付（YYYY-MM-DD）
  # printer: "{{PRINTER}}"        # 印刷所名
