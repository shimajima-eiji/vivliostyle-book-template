# 索引用語リスト
# フォーマット:
#   term:     索引に表示する用語名
#   patterns: 本文を検索する文字列（正規表現可）。省略時は term をそのまま検索
#   reading:  あいうえお順ソート用よみ（省略時は pykakasi で自動変換）
#   xref:     クロスリファレンス。「→ 参照先用語」のように記述
#
# 生成コマンド:
#   uv run --with "pykakasi,pyyaml" python scripts/gen-index.py
#   または: make index
#
# ─── 例（削除して使う） ──────────────────────────────────────────

# - term: "用語名"
#   patterns: ["検索パターン1", "検索パターン2"]
#   reading: "よみ"

# - term: "クロスリファレンス例"
#   reading: "くろすりふぁれんす"
#   xref: "→ 参照先"
